<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="564" cy="110" r="27" fill="#4338ca" opacity="0.13"/>
    <circle cx="427" cy="410" r="42" fill="#4338ca" opacity="0.15"/>
    <circle cx="285" cy="201" r="80" fill="#4338ca" opacity="0.07"/>
    <circle cx="353" cy="-92" r="72" fill="#4338ca" opacity="0.08"/>
    <circle cx="1167" cy="-9" r="73" fill="#4338ca" opacity="0.10"/>
    <circle cx="803" cy="85" r="32" fill="#4338ca" opacity="0.16"/>
    <rect x="390" y="287" width="81" height="94" rx="8" fill="#4f46e5" opacity="0.14" transform="rotate(42, 161, 648)"/>
    <rect x="992" y="702" width="90" height="98" rx="8" fill="#4f46e5" opacity="0.13" transform="rotate(3, 1066, 698)"/>
    <rect x="196" y="274" width="47" height="35" rx="8" fill="#4f46e5" opacity="0.10" transform="rotate(22, 236, 327)"/>
    <rect x="-16" y="-86" width="71" height="31" rx="8" fill="#4f46e5" opacity="0.04" transform="rotate(20, 278, 500)"/>
    <rect x="73" y="97" width="56" height="80" rx="8" fill="#4f46e5" opacity="0.07" transform="rotate(23, 378, 512)"/>
    <rect x="700" y="201" width="61" height="97" rx="8" fill="#4f46e5" opacity="0.12" transform="rotate(13, -31, 50)"/>
    <rect x="393" y="364" width="79" height="38" rx="8" fill="#4f46e5" opacity="0.06" transform="rotate(43, 162, 565)"/>
    <rect x="138" y="111" width="61" height="79" rx="8" fill="#4f46e5" opacity="0.13" transform="rotate(34, 624, -32)"/>
    <polygon points="421,-134 489,2 353,2" fill="#4338ca" opacity="0.11"/>
    <polygon points="-69,476 -45,524 -93,524" fill="#4338ca" opacity="0.08"/>
    <polygon points="913,99 1004,281 822,281" fill="#4338ca" opacity="0.07"/>
    <polygon points="1085,563 1118,629 1052,629" fill="#4338ca" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,538 C360,584 840,492 1200,538 L1200,630 L0,630Z" fill="#4338ca" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    화곡 셔츠룸
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#818cf8" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#818cf8" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 화곡 셔츠룸 — 서버 웜업
  </text>
</svg>